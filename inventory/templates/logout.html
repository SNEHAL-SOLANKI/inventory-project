{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>xyz Logout</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="icon" href="{% static 'images/LOGO1.png' %}" width="80%">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .modal-content{
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }
        
    </style>
</head>
<body>
<!-- Logout Modal -->

<div class="modal fade shadow-lg border-dark" id="logoutModal" tabindex="-1">

<div class="modal-dialog modal-dialog-centered modal-md">

<div class="modal-content text-dark">

<div class="modal-header">

<h5 class="modal-title">
<i class="bi bi-exclamation-triangle text-dark fw-bolder w-75"></i> Confirm Logout
</h5>

<button type="button" class="btn-close btn-close-dark" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body text-center text-secondary fw-bolder w-75 mx-auto">

<p class="mb-0">Are you sure you want to logout?</p>

</div>

<div class="modal-footer border-secondary justify-content-center">

<button class="btn btn-primary" data-bs-dismiss="modal">
Cancel
</button>

<button class="btn btn-theme" onclick="logout()">
Logout
</button>

</div>
</div>
</div>
</div>

<script>
function logout(){
window.location.href="{% url 'login' %}";
}
</script>
</body>
</html>
